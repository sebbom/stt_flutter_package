name: stt_flutter_example
description: Example app for stt_flutter package.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  stt_flutter:
    path: ../
  flutter_sound: ^9.30.0
  permission_handler: ^11.0.0
