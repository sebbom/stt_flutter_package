name: stt_flutter_example
description: Example app for stt_flutter package — streaming VAD, model switching.
publish_to: none
version: 0.3.0

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  stt_flutter:
    path: ../
  permission_handler: ^11.0.0
  path_provider: ^2.1.0
  file_picker: ^10.3.3
  record: ^7.0.0
  device_info_plus: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/hello_en.wav
    - assets/denoisers/gtcrn/model.onnx
    - assets/denoisers/dpdfnet/model.onnx
