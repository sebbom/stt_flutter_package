name: stt_flutter
description: Fully local, on-device speech-to-text using sherpa_onnx native ONNX Runtime (Whisper, Sherpa, Kroko, Parakeet).
version: 0.2.0
repository: https://github.com/sebbom/stt_flutter_package

environment:
  sdk: ^3.0.0
  flutter: '>=3.7.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  path_provider: ^2.1.0
  archive: ^4.0.0
  file: ^7.0.0
  crypto: ^3.0.0
  path: ^1.9.0
  record: ^7.0.0
  device_info_plus: ^11.0.0
  sherpa_onnx: ^1.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
