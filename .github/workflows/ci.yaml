name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: dart pub publish --dry-run
